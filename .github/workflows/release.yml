name: Release-pipeline

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Get the version from the github tag ref
        id: get_version
        run: echo "VERSION=${GITHUB_REF/refs\/tags\//}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Build new dashboard
        run: |
          pnpm install --frozen-lockfile
          pnpm build
        env:
          VITE_API_BASE_URL: "/api/v1"
          VITE_FRONTEND_VERSION: ${{ steps.get_version.outputs.VERSION }}
          VITE_REO_KEY: ${{ secrets.REO_KEY }}

      - name: Generate Changelog
        uses: heinrichreimer/github-changelog-generator-action@e60b5a2bd9fcd88dadf6345ff8327863fb8b490f # v2.4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pullRequests: "false"
          onlyLastTag: "true"
          stripGeneratorNotice: "true"
          issuesWoLabels: "true"
          stripHeaders: "true"

      - name: Create release archive
        run: |
          tar -zcf zenml-dashboard.tar.gz -C dist --transform="s#\.\/##" .
          sha256sum -b zenml-dashboard.tar.gz > zenml-dashboard.tar.gz.sha256

      - name: Release to GitHub
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0 # zizmor: ignore[superfluous-actions] preserves existing release behavior; refactoring to gh CLI is out of scope.
        with:
          files: |
            zenml-dashboard.tar.gz
            zenml-dashboard.tar.gz.sha256
          body_path: ./CHANGELOG.md
          prerelease: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
